<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog — LaptopRent</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .katalog-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 2rem;
      padding: 3rem 0;
    }
    .filter-sidebar {
      background: white;
      padding: 1.5rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      height: max-content;
      position: sticky;
      top: 100px;
    }
    .filter-section {
      margin-bottom: 1.5rem;
    }
    .filter-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--secondary-color);
      margin-bottom: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .laptop-card {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .laptop-image-placeholder {
      background: rgba(37,99,235,0.05);
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border-color);
      color: var(--accent-color);
    }
    .laptop-content {
      padding: 1.2rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    .laptop-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .laptop-spec {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      flex-grow: 1;
    }
    .laptop-price {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 1rem;
    }
    .laptop-price span {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
      font-family: 'Inter', sans-serif;
    }
    
    @media (max-width: 768px) {
      .katalog-layout {
        grid-template-columns: 1fr;
      }
      .filter-sidebar {
        position: static;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">Laptop<span>Rent</span></a>
      <div class="nav-links">
        <a href="/katalog.html" style="color: var(--accent-color);">Katalog</a>
        <a href="/#cara-sewa">Cara Sewa</a>
        <div id="auth-nav" style="display: flex; align-items: center;"></div>
      </div>
    </div>
  </nav>
  <main class="container katalog-layout">
    <!-- Bagian Sidebar Filter yang Diperbarui -->
<aside class="filter-sidebar">
    <h3 class="mb-3">Filter</h3>
    
    <div class="filter-section">
        <div class="filter-title">Pencarian</div>
        <input type="text" id="search" class="form-control" placeholder="Cari merk, spek...">
    </div>
    
    <div class="filter-section">
        <div class="filter-title">Merk</div>
        <select id="merk" class="form-control">
            <option value="">Semua Merk</option>
        </select>
    </div>

    <div class="filter-section">
        <div class="filter-title">Status</div>
        <select id="status" class="form-control">
            <option value="">Semua Status</option>
            <option value="Tersedia">Tersedia</option>
            <option value="Disewa">Disewa</option>
            <option value="Maintenance">Maintenance</option>
        </select>
    </div>
    
    <!-- Hapus onclick="loadKatalog(1)", ditangani addEventListener di JS -->
    <button class="btn btn-primary" style="width:100%">Terapkan Filter</button>
</aside>
    <section>
      <div class="mb-3" style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="font-size: 1.8rem;">Katalog Laptop</h2>
        <span id="totalItems" class="text-muted" style="font-size: 0.9rem;">Memuat...</span>
      </div>
      
      <div class="grid grid-cols-3" id="katalogGrid">
        <!-- Diisi JS -->
      </div>
      
      <div id="pagination" class="mt-4" style="display: flex; gap: 0.5rem; justify-content: center;">
        <!-- Diisi JS -->
      </div>
    </section>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/katalog.js"></script>
</body>
</html>
